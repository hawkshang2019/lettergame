# Netlify配置文件

[build]
  command = "npm run build"
  publish = "dist"

# SPA重定向规则 - 支持React Router
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Netlify Functions配置
[functions]
  node_bundler = "esbuild"
  
# 环境变量
[build.environment]
  NODE_VERSION = "18"